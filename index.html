<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>niva 音樂節奏遊戲 — 原生版(秒開)</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%;
    background: linear-gradient(180deg, #f5f7fc 0%, #e7ecf6 100%); color: #2a2f3a;
    font-family: "Noto Sans TC", "Segoe UI", system-ui, sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  header { width: 100%; max-width: 640px; padding: 18px 16px 6px; text-align: center; }
  header h1 {
    margin: 0;
    font-family: "Orbitron", "Noto Sans TC", system-ui, sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 6vw, 34px);
    letter-spacing: 2px;
    line-height: 1.15;
    background: linear-gradient(95deg, #7df9ff 0%, #9a8cff 52%, #ff7ad9 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 20px rgba(122, 160, 255, .28));
  }
  #stage-wrap { position: relative; width: 640px; max-width: 100vw; aspect-ratio: 4 / 3;
    margin: 12px 0; background: #000; border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #game { width: 100%; height: 100%; display: block; cursor: pointer; }
</style>
</head>
<body>
  <header>
    <h1>niva 音樂節奏遊戲 56</h1>
  </header>
  <div id="stage-wrap"><canvas id="game"></canvas></div>
  <script src="core.js"></script>
  <script src="game.js"></script>
</body>
</html>
